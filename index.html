<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>Cost Model Planner v9</title>
    <style>
        body { font-family: sans-serif; background: #0f0e0d; color: #ece9e1; padding: 20px; }
        .app { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* KPI BAR */
        .kpi-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .kpi { background: #1a1917; padding: 15px; border-radius: 12px; border: 1px solid #2e2d2b; }
        .kpi .helper { font-size: 11px; color: #888; margin-bottom: 5px; }
        .kpi h2 { font-size: 18px; margin: 0; }

        .layout { display: grid; grid-template-columns: 400px 1fr; gap: 20px; }
        .panel { background: #1a1917; padding: 20px; border-radius: 12px; border: 1px solid #2e2d2b; }
        
        /* Mesi */
        .month-card { background: #141312; padding: 15px; border-radius: 10px; border: 1px solid #2e2d2b; margin-bottom: 15px; }
        .month-name { width: 100%; margin-bottom: 10px; font-weight: bold; background: transparent; border: none; color: #fff; font-size: 16px; }
        .grid-header, .grid-row { display: grid; grid-template-columns: 60px repeat(3, 1fr); gap: 5px; align-items: center; }
        .label-row { font-size: 11px; font-weight: bold; color: #4f98a3; }
        .label-col { font-size: 10px; color: #888; text-align: center; }
        
        input, select { width: 100%; padding: 6px; background: #1a1917; color: #fff; border: 1px solid #2e2d2b; border-radius: 4px; font-size: 13px; }
        .btn-cta { background: #4f98a3; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 12px; border-bottom: 1px solid #2e2d2b; text-align: right; }
    </style>
</head>
<body>
    <div class="app">
        <div class="kpi-bar">
            <div class="kpi"><div class="helper">Delta totale</div><h2 id="kpiDelta">—</h2></div>
            <div class="kpi"><div class="helper">Carry-over totale</div><h2 id="kpiCarry">—</h2></div>
            <div class="kpi"><div class="helper">Mese migliore</div><h2 id="kpiBest">—</h2></div>
            <div class="kpi"><div class="helper">Mese peggiore</div><h2 id="kpiWorst">—</h2></div>
        </div>

        <div class="layout">
            <aside>
                <div class="panel">
                    <strong>Configurazione Costi</strong>
                    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0;">
                        <input id="costA" type="number" value="498.13" title="Costo A">
                        <input id="costB" type="number" value="341.49" title="Costo B">
                        <input id="costC" type="number" value="246.33" title="Costo C">
                    </div>
                    <div style="font-size:12px; color:#888; margin-bottom:5px;">Target conversione:</div>
                    <select id="convTarget"><option>A</option><option>B</option><option selected>C</option></select>
                </div>
                <button class="btn-cta" id="addMonthBtn" style="margin-top:15px;">+ Aggiungi Mese</button>
                <div id="monthsContainer" style="margin-top:15px;"></div>
            </aside>

            <main class="panel">
                <strong>Riepilogo Dettagliato</strong>
                <table>
                    <thead><tr><th>Mese</th><th>Delta €</th><th>Carry-over</th></tr></thead>
                    <tbody id="summaryBody"></tbody>
                </table>
            </main>
        </div>
    </div>

<script>
    const costs = {A: 498.13, B: 341.49, C: 246.33};

    function updateApp() {
        const target = document.getElementById('convTarget').value;
        const tbody = document.getElementById('summaryBody');
        tbody.innerHTML = '';
        
        let totalDelta = 0, totalCarry = 0;
        let bestDelta = -Infinity, worstDelta = Infinity;
        let bestName = '—', worstName = '—';

        document.querySelectorAll('.month-card').forEach(card => {
            const vals = { prevA:0, prevB:0, prevC:0, consA:0, consB:0, consC:0 };
            card.querySelectorAll('input.mf').forEach(i => vals[i.dataset.f] = parseFloat(i.value) || 0);
            
            const prev = (vals.prevA*costs.A) + (vals.prevB*costs.B) + (vals.prevC*costs.C);
            const cons = (vals.consA*costs.A) + (vals.consB*costs.B) + (vals.consC*costs.C);
            const delta = prev - cons;
            const carry = ((vals.prevA-vals.consA)*costs.A + (vals.prevB-vals.consB)*costs.B + (vals.prevC-vals.consC)*costs.C) / costs[target];
            
            totalDelta += delta; totalCarry += carry;
            if(delta > bestDelta) { bestDelta = delta; bestName = card.querySelector('.month-name').value; }
            if(delta < worstDelta) { worstDelta = delta; worstName = card.querySelector('.month-name').value; }
            
            tbody.innerHTML += `<tr><td>${card.querySelector('.month-name').value}</td><td>${delta.toFixed(2)}</td><td>${carry.toFixed(2)} gg ${target}</td></tr>`;
        });

        document.getElementById('kpiDelta').innerText = totalDelta.toFixed(2) + ' €';
        document.getElementById('kpiCarry').innerText = totalCarry.toFixed(2) + ' gg ' + target;
        document.getElementById('kpiBest').innerText = bestName;
        document.getElementById('kpiWorst').innerText = worstName;
    }

    function addMonth(name = "Nuovo Mese") {
        const div = document.createElement('div');
        div.className = 'month-card';
        div.innerHTML = `
            <input class="month-name" value="${name}">
            <div class="grid-header"><div></div><div class="label-col">A</div><div class="label-col">B</div><div class="label-col">C</div></div>
            <div class="grid-row"><div class="label-row">PREV</div>
                <input class="mf" data-f="prevA" type="number" value="0">
                <input class="mf" data-f="prevB" type="number" value="0">
                <input class="mf" data-f="prevC" type="number" value="0">
            </div>
            <div class="grid-row"><div class="label-row">CONS</div>
                <input class="mf" data-f="consA" type="number" value="0">
                <input class="mf" data-f="consB" type="number" value="0">
                <input class="mf" data-f="consC" type="number" value="0">
            </div>`;
        div.querySelectorAll('input').forEach(i => i.addEventListener('input', updateApp));
        document.getElementById('monthsContainer').appendChild(div);
        updateApp();
    }

    document.getElementById('addMonthBtn').addEventListener('click', () => addMonth());
    document.getElementById('convTarget').addEventListener('change', updateApp);
    ['costA', 'costB', 'costC'].forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            costs[id.replace('cost', '')] = parseFloat(e.target.value) || 0;
            updateApp();
        });
    });

    addMonth('Maggio');
</script>
</body>
</html>
